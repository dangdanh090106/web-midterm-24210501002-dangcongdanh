<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Khóa Học - CDAcademy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-dark text-white">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top border-b">
        <div class="container">
            <a class="navbar-brand text-gradient" href="index.html">CDAcademy</a>
            <div class="navbar-nav ms-auto d-flex flex-row gap-3">
                <a class="nav-link" href="index.html">Trang Chủ</a>
                <a class="nav-link" href="courses.html">Khóa Học</a>
                <a class="nav-link active" href="register.html">Đăng Ký</a>
                <a class="nav-link" href="registrations.html">Danh Sách</a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card bg-black border-secondary p-4 text-white shadow-lg">
                    <h3 class="text-center text-gradient mb-4">Form Đăng Ký Học</h3>
                    <form id="registerForm" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Họ và tên</label>
                            <input type="text" id="fullName" class="form-control bg-dark text-white border-secondary">
                            <small class="text-danger error-msg" id="errFullName"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" id="email" class="form-control bg-dark text-white border-secondary">
                            <small class="text-danger error-msg" id="errEmail"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input type="text" id="phone" class="form-control bg-dark text-white border-secondary">
                            <small class="text-danger error-msg" id="errPhone"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Lớp sinh hoạt</label>
                            <input type="text" id="className" class="form-control bg-dark text-white border-secondary">
                            <small class="text-danger error-msg" id="errClassName"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Chọn khóa học muốn tham gia</label>
                            <select id="selectCourse" class="form-select bg-dark text-white border-secondary">
                                <option value="">-- Chọn khóa học --</option>
                            </select>
                            <small class="text-danger error-msg" id="errSelectCourse"></small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ghi chú (Không bắt buộc)</label>
                            <textarea id="note" class="form-control bg-dark text-white border-secondary" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-cyan w-100 fw-bold mt-3">GỬI ĐĂNG KÝ</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/data.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
