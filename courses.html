<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>TechAcademy - Khóa Học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="index.html">TechAcademy</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-item nav-link" href="index.html">Trang chủ</a>
                <a class="nav-item nav-link active" href="courses.html">Khóa học</a>
                <a class="nav-item nav-link" href="register.html">Đăng ký</a>
                <a class="nav-item nav-link" href="registrations.html">Danh sách lớp</a>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <h2 class="text-center mb-4">Danh Sách Khóa Học Công Nghệ</h2>

        <!-- Bộ lọc Tìm kiếm và Lọc Danh mục -->
        <div class="row g-3 mb-4 bg-light p-3 rounded">
            <div class="col-md-6">
                <input type="text" id="searchBox" class="form-control" placeholder="Nhập tên khóa học để tìm...">
            </div>
            <div class="col-md-4">
                <select id="categorySelect" class="form-select">
                    <option value="all">Tất cả danh mục</option>
                    <option value="frontend">Frontend</option>
                    <option value="backend">Backend</option>
                </select>
            </div>
            <div class="col-md-2">
                <button id="btnReset" class="btn btn-secondary w-100">Xóa bộ lọc</button>
            </div>
        </div>

        <!-- Vùng trống để mảng JavaScript tự động tạo 8 card khóa học ở đây -->
        <div class="row g-4" id="courseList"></div>
    </div>

    <!-- Bootstrap Modal tĩnh dùng chung để xem chi tiết -->
    <div class="modal fade" id="detailModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="modalTitle">Tên khóa học</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p id="modalBody">Nội dung chi tiết...</p>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Đóng</button>
                    <a href="register.html" class="btn btn-primary">Đăng ký học</a>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">TRƯỜNG ĐẠI HỌC BÌNH DƯƠNG - PHÂN HIỆU CÀ MAU</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Nhúng file chứa mảng dữ liệu trước, file xử lý main sau -->
    <script src="assets/js/data.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
